<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        font-family: Arial;
    }

    .card {
        width: 350px;
        padding: 25px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        text-align: center;
    }

    .card h2 {
        margin-bottom: 20px;
        color: #0d6efd;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 8px rgba(13,110,253,0.3);
    }

    button {
        width: 100%;
        padding: 12px;
        background: #0d6efd;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #0b5ed7;
    }

    </style>

</head>

<body>

<div class="card">

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <p style="margin-top:15px;">

            Don't have an account?

           <a href="/signup/">
                    Create Account
            </a>

</p>

    </form>

</div>

</body>
</html>
