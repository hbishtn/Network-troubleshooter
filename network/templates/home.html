<!DOCTYPE html>
<html>
<head>
    <title>AI Network Troubleshooter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center">AI Network Troubleshooter</h2>

    <form method="POST" class="mt-4">
        {% csrf_token %}

        <textarea name="problem" class="form-control" rows="5"
        placeholder="Enter your network problem"></textarea>

        <button class="btn btn-primary mt-3">Analyze</button>
    </form>

    <hr>

    {% if response %}
    <div class="card mt-4">
        <div class="card-body">
            <pre style="white-space: pre-wrap;">{{ response }}</pre>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
