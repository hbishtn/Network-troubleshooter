<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #198754, #20c997);
        font-family: Arial;
    }

    .card {
        width: 350px;
        padding: 25px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        text-align: center;
    }

    .card h2 {
        margin-bottom: 15px;
        color: #198754;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #198754;
        box-shadow: 0 0 8px rgba(25,135,84,0.3);
    }

    button {
        width: 100%;
        padding: 12px;
        background: #198754;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #157347;
    }

    .error {
        color: red;
        font-size: 14px;
        margin-bottom: 10px;
    }

    </style>

</head>

<body>

<div class="card">

    <h2>Signup</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Signup</button>
        <p style="margin-top:15px;">

            Already have an account?

            <a href="/login/">
                Login
            </a>

</p>

    </form>

</div>

</body>
</html>
